name: Build & Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install jlayer to local Maven repo
        run: |
          mvn install:install-file \
            -Dfile=jlayer-1.0.1.jar \
            -DgroupId=javazoom \
            -DartifactId=jlayer \
            -Dversion=1.0.1 \
            -Dpackaging=jar \
            -q

      - name: Build fat JAR
        run: mvn package -q

      - name: Prepare site
        run: |
          mkdir -p _site
          cp docs/index.html _site/index.html
          cp target/PokemonGame-jar-with-dependencies.jar _site/PokemonGame.jar
          echo "JAR size: $(du -sh _site/PokemonGame.jar)"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
